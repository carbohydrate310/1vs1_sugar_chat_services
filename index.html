<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fast Chat - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="auth-container">
        <section class="auth-card">
            <h1 class="brand-title">Fast Chat</h1>
            
            <form id="auth-form">
                <div id="display-name-group" class="input-group hidden">
                    <label for="display-name">表示名</label>
                    <input type="text" id="display-name" placeholder="例: 田中 太郎">
                </div>

                <div class="input-group">
                    <label for="username">ユーザー名</label>
                    <input type="text" id="username" placeholder="半角英数字" required>
                </div>

                <div class="input-group">
                    <label for="password">パスワード</label>
                    <input type="password" id="password" placeholder="6文字以上" required>
                </div>

                <button type="submit" id="submit-btn" class="primary-btn">ログイン</button>
            </form>

            <div class="divider">または</div>

            <button id="google-login-btn" class="secondary-btn">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" alt="G" width="18">
                Googleで続行
            </button>

            <footer class="auth-footer">
                <p id="toggle-text">アカウントをお持ちでないですか？ <span id="switch-mode">新規登録</span></p>
            </footer>
        </section>
    </main>

    <script type="module" src="auth.js"></script>
</body>
</html>
